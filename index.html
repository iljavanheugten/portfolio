<style>

    background:black;

}

h1{
    text-align:center;

.project{

.project-title-left{

    display: inline-block;

.project-title-right{

    float: right;
    max-width: 50%;

.project-header{
    width: 100%;

.images{
    display:flex;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
    padding-bottom:6px;
    cursor: grab;

    scrollbar-width: thin;
    scrollbar-color: #555 black;
}

.images::-webkit-scrollbar {
    height: 10px;
}

.images::-webkit-scrollbar-track {
    background: black;
}

.images::-webkit-scrollbar-thumb {
    background-color: #555;
    border-radius: 5px;
}

.images::-webkit-scrollbar-thumb:hover {
    background-color: #888;
}

.images img{
    height:250px;
    flex-shrink:0;
    display:block;
    user-drag: none;
    user-select: none;
}

    }

    .project-title-right{

    }

    .images img{

    }

}

  </div>

<script>
// Drag to scroll
const sliders = document.querySelectorAll('.images');

sliders.forEach(slider => {
    let isDown = false;
    let startX;
    let scrollStart;

    slider.querySelectorAll('img').forEach(img => img.draggable = false);

    slider.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDown = true;
        slider.style.cursor = 'grabbing';
        startX = e.clientX;
        scrollStart = slider.scrollLeft;
    });

    slider.addEventListener('mouseup', () => {
        isDown = false;
        slider.style.cursor = 'grab';
    });

    slider.addEventListener('mouseleave', () => {
        isDown = false;
        slider.style.cursor = 'grab';
    });

    slider.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.clientX;
        const walk = (x - startX) * 2;
        slider.scrollLeft = scrollStart - walk;
    });

    window.addEventListener('mouseup', () => {
        isDown = false;
        slider.style.cursor = 'grab';
    });
});
</script>
