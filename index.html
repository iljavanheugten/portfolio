<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      padding: 48px 24px;
    }

    .project {
      margin-bottom: 64px;
    }

    .project-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .project-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .project-role {
      font-size: 15px;
      font-weight: 400;
    }

    .project-images {
      display: flex;
      overflow-x: auto;
      gap: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .project-images::-webkit-scrollbar {
      display: none;
    }

    .project-images img {
      flex: 0 0 auto;
      height: 220px;
      width: auto;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div class="project">
    <div class="project-meta">
      <span class="project-title">de ijzeren jungle</span>
      <span class="project-role">gaffer &amp; colorist</span>
    </div>
    <div class="project-images">
      <img src="deijzerenjungle/01.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/02.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/03.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/04.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/05.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/06.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/07.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/08.webp" alt="de ijzeren jungle">
      <img src="deijzerenjungle/09.webp" alt="de ijzeren jungle">
    </div>
  </div>

  <div class="project">
    <div class="project-meta">
      <span class="project-title">even voor eeuwig</span>
      <span class="project-role">dop, gaffer &amp; colorist</span>
    </div>
    <div class="project-images">
      <img src="evenvooreeuwig/01.webp" alt="even voor eeuwig">
      <img src="evenvooreeuwig/02.webp" alt="even voor eeuwig">
      <img src="evenvooreeuwig/03.webp" alt="even voor eeuwig">
    </div>
  </div>

</body>
</html>
